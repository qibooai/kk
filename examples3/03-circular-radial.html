<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koala Kaktüs - Circular Radial</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poiret+One&family=Quicksand:wght@300;500;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Quicksand', sans-serif;
            background: #1a1410;
            color: #f5e6d3;
            overflow: hidden;
            height: 100vh;
        }

        /* Central Circle Container */
        .circle-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90vmin;
            height: 90vmin;
        }

        /* Center Logo */
        .center-logo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 280px;
            height: 280px;
            background: linear-gradient(135deg, #d4a574 0%, #c49461 100%);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            z-index: 100;
            box-shadow: 0 0 60px rgba(212, 165, 116, 0.4);
            cursor: pointer;
            transition: all 0.4s ease;
        }

        .center-logo:hover {
            transform: translate(-50%, -50%) scale(1.1);
            box-shadow: 0 0 80px rgba(212, 165, 116, 0.6);
        }

        .center-logo h1 {
            font-family: 'Poiret One', cursive;
            font-size: 3rem;
            color: #1a1410;
            margin-bottom: 0.5rem;
        }

        .center-logo p {
            font-size: 1rem;
            color: #1a1410;
            opacity: 0.8;
            letter-spacing: 3px;
        }

        /* Orbiting Menu Items */
        .orbit-item {
            position: absolute;
            width: 180px;
            height: 180px;
            background: rgba(245, 230, 211, 0.1);
            border: 3px solid #d4a574;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            backdrop-filter: blur(10px);
            cursor: pointer;
            transition: all 0.4s ease;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .orbit-item:hover {
            background: rgba(212, 165, 116, 0.3);
            border-color: #f5e6d3;
            transform: scale(1.15) translateY(-15px);
            box-shadow: 0 0 40px rgba(212, 165, 116, 0.5);
        }

        .orbit-item .emoji {
            font-size: 3.5rem;
            margin-bottom: 0.8rem;
        }

        .orbit-item h3 {
            font-size: 1.3rem;
            color: #f5e6d3;
            margin-bottom: 0.3rem;
        }

        .orbit-item p {
            font-size: 0.85rem;
            color: #d4a574;
            opacity: 0.9;
        }

        /* Position items in circle - 8 items */
        .item-1 {
            top: 0%;
            left: 50%;
            transform: translate(-50%, -100%);
            animation-delay: 0s;
        }

        .item-2 {
            top: 15%;
            right: 0%;
            transform: translate(50%, -50%);
            animation-delay: 0.5s;
        }

        .item-3 {
            top: 50%;
            right: 0%;
            transform: translate(100%, -50%);
            animation-delay: 1s;
        }

        .item-4 {
            bottom: 15%;
            right: 0%;
            transform: translate(50%, 50%);
            animation-delay: 1.5s;
        }

        .item-5 {
            bottom: 0%;
            left: 50%;
            transform: translate(-50%, 100%);
            animation-delay: 2s;
        }

        .item-6 {
            bottom: 15%;
            left: 0%;
            transform: translate(-50%, 50%);
            animation-delay: 2.5s;
        }

        .item-7 {
            top: 50%;
            left: 0%;
            transform: translate(-100%, -50%);
            animation-delay: 3s;
        }

        .item-8 {
            top: 15%;
            left: 0%;
            transform: translate(-50%, -50%);
            animation-delay: 3.5s;
        }

        /* Connecting Lines */
        .connection-line {
            position: absolute;
            height: 2px;
            background: linear-gradient(90deg, transparent, #d4a574, transparent);
            opacity: 0.3;
            z-index: 1;
        }

        /* Background Circles */
        .bg-circle {
            position: absolute;
            border: 1px solid rgba(212, 165, 116, 0.2);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .bg-circle-1 {
            width: 400px;
            height: 400px;
        }

        .bg-circle-2 {
            width: 700px;
            height: 700px;
        }

        .bg-circle-3 {
            width: 1000px;
            height: 1000px;
        }

        /* Animated Particles */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #d4a574;
            border-radius: 50%;
            opacity: 0.6;
            animation: particle-float 4s ease-in-out infinite;
        }

        @keyframes particle-float {
            0%, 100% {
                transform: translate(0, 0);
                opacity: 0;
            }
            50% {
                opacity: 0.8;
            }
        }

        .particle-1 { top: 20%; left: 30%; animation-delay: 0s; }
        .particle-2 { top: 60%; right: 20%; animation-delay: 1s; }
        .particle-3 { bottom: 30%; left: 40%; animation-delay: 2s; }
        .particle-4 { top: 40%; right: 35%; animation-delay: 3s; }

        /* Info Panel (Hidden by default, shows on click) */
        .info-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 600px;
            background: rgba(26, 20, 16, 0.98);
            border: 3px solid #d4a574;
            border-radius: 30px;
            padding: 3rem;
            z-index: 1000;
            opacity: 0;
            transition: all 0.4s ease;
        }

        .info-panel.active {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        .info-panel h2 {
            font-family: 'Poiret One', cursive;
            font-size: 3rem;
            color: #d4a574;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .info-panel p {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #f5e6d3;
            margin-bottom: 1rem;
        }

        .close-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 40px;
            height: 40px;
            background: none;
            border: 2px solid #d4a574;
            border-radius: 50%;
            color: #d4a574;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .close-btn:hover {
            background: #d4a574;
            color: #1a1410;
        }

        @media (max-width: 768px) {
            .orbit-item { width: 120px; height: 120px; }
            .orbit-item .emoji { font-size: 2.5rem; }
            .orbit-item h3 { font-size: 1rem; }
            .orbit-item p { font-size: 0.75rem; }
            .center-logo { width: 200px; height: 200px; }
            .center-logo h1 { font-size: 2rem; }
            .info-panel { width: 90%; }
        }
    </style>
</head>
<body>
    <!-- Background Circles -->
    <div class="bg-circle bg-circle-1"></div>
    <div class="bg-circle bg-circle-2"></div>
    <div class="bg-circle bg-circle-3"></div>

    <!-- Particles -->
    <div class="particle particle-1"></div>
    <div class="particle particle-2"></div>
    <div class="particle particle-3"></div>
    <div class="particle particle-4"></div>

    <!-- Main Circle Container -->
    <div class="circle-container">
        <!-- Center Logo -->
        <div class="center-logo">
            <h1>KOALA<br>KAKTÜS</h1>
            <p>ANTAKYA</p>
        </div>

        <!-- Orbit Items -->
        <div class="orbit-item item-1" data-info="menu1">
            <div class="emoji">🥙</div>
            <h3>İçli Köfte</h3>
            <p>Antakya Usulü</p>
        </div>

        <div class="orbit-item item-2" data-info="about">
            <div class="emoji">🏠</div>
            <h3>Hakkımızda</h3>
            <p>Hikayemiz</p>
        </div>

        <div class="orbit-item item-3" data-info="menu2">
            <div class="emoji">🌶️</div>
            <h3>Muhammara</h3>
            <p>Özel Meze</p>
        </div>

        <div class="orbit-item item-4" data-info="contact">
            <div class="emoji">📍</div>
            <h3>İletişim</h3>
            <p>Bizi Bulun</p>
        </div>

        <div class="orbit-item item-5" data-info="menu3">
            <div class="emoji">✨</div>
            <h3>Künefe</h3>
            <p>Özel Tatlı</p>
        </div>

        <div class="orbit-item item-6" data-info="reserve">
            <div class="emoji">📞</div>
            <h3>Rezervasyon</h3>
            <p>Masa Ayırtın</p>
        </div>

        <div class="orbit-item item-7" data-info="menu4">
            <div class="emoji">🍖</div>
            <h3>Kağıt Kebabı</h3>
            <p>Özel Tarif</p>
        </div>

        <div class="orbit-item item-8" data-info="quality">
            <div class="emoji">🌿</div>
            <h3>Kalite</h3>
            <p>Taze Malzeme</p>
        </div>
    </div>

    <!-- Info Panel -->
    <div class="info-panel" id="infoPanel">
        <button class="close-btn" onclick="closePanel()">×</button>
        <div id="panelContent"></div>
    </div>

    <script>
        const infoData = {
            menu1: {
                title: 'İçli Köfte',
                text: 'Antakya\'nın meşhur içli köftesi. Taş fırında pişmiş, bulgur ve kıymayla hazırlanan geleneksel tarif. İzmir\'in en iyi Antakya mutfağında.'
            },
            about: {
                title: 'Koala Kaktüs',
                text: 'İzmir\'de küçük ama özel bir Antakya restoranı. Her yemek, nesillerdir aktarılan tariflerle ve en taze malzemelerle özenle hazırlanır.'
            },
            menu2: {
                title: 'Muhammara',
                text: 'Ceviz, biber ve özel baharatlarla hazırlanan geleneksel Antakya mezesi. Evde yapılmış ekmekle servis edilir.'
            },
            contact: {
                title: 'Bizi Ziyaret Edin',
                text: 'İzmir, Türkiye<br>Tel: +90 XXX XXX XX XX<br>Her gün 11:00 - 23:00<br>İzmir\'in kalbinde sizi bekliyoruz!'
            },
            menu3: {
                title: 'Künefe',
                text: 'Tuzsuz peynir, kadayıf ve şerbetle hazırlanan Antakya\'nın en meşhur tatlısı. Sıcak servis edilir.'
            },
            reserve: {
                title: 'Rezervasyon',
                text: 'Rezervasyon için lütfen bizi arayın: +90 XXX XXX XX XX<br><br>Özellikle hafta sonları için önceden rezervasyon öneriyoruz.'
            },
            menu4: {
                title: 'Kağıt Kebabı',
                text: 'Özel baharatlarla marine edilmiş, kağıtta pişirilen enfes kebap. Pilavla servis edilir.'
            },
            quality: {
                title: 'Kalitemiz',
                text: 'Her gün taze ve en kaliteli malzemeler kullanıyoruz. Antakya\'dan gelen özel baharatlarımızla özgün tatlar sunuyoruz.'
            }
        };

        document.querySelectorAll('.orbit-item, .center-logo').forEach(item => {
            item.addEventListener('click', function() {
                const infoKey = this.getAttribute('data-info') || 'about';
                const data = infoData[infoKey];
                document.getElementById('panelContent').innerHTML = `
                    <h2>${data.title}</h2>
                    <p>${data.text}</p>
                `;
                document.getElementById('infoPanel').classList.add('active');
            });
        });

        function closePanel() {
            document.getElementById('infoPanel').classList.remove('active');
        }

        // Close on escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closePanel();
        });
    </script>
</body>
</html>
